name: Auto Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.74.0.1)'
        required: false
        type: string

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'giovannimnz/gsd-2' }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag_name: ${{ steps.get-version.outputs.tag_name }}
    steps:
      - name: Get version
        id: get-version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          TAG="v${VERSION}"
          
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          
          if [[ -n "$PREV_TAG" ]]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}")
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" -20)
          fi
          
          cat > NOTES.md << EOF
          ## GSD-2 ${VERSION}
          
          ### Changes
          
          ${CHANGES}
          
          ---
          *Released automatically via GitHub Actions*
          EOF
          
          echo "notes_file=NOTES.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get-version.outputs.tag_name }}
          name: "GSD-2 ${{ steps.get-version.outputs.version }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: create-release
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'giovannimnz/gsd-2' }}
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Dry-run package
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release summary
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          {
            echo "## Released v${VERSION}"
            echo
            echo "- npm: https://www.npmjs.com/package/gsd-pi/v/${VERSION}"
            echo "- GitHub: https://github.com/giovannimnz/gsd-2/releases/tag/v${VERSION}"
          } >> "$GITHUB_STEP_SUMMARY"
