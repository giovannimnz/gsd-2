name: Daily Upstream Sync

# Runs daily at 03:00 UTC, on PR, and manual dispatch
on:
  schedule:
    - cron: '0 3 * * *'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      local_only:
        description: 'Local sync only (no commit/push)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  packages: none
  deployments: none

env:
  FORCE_COLOR: '0'
  # Pass local_only flag to the sync script
  LOCAL_ONLY: ${{ github.event.inputs.local_only || 'false' }}

jobs:
  sync:
    name: Sync with upstream
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'giovannimnz/gsd-2' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Run fork sync
        run: |
          chmod +x scripts/sync-fork.sh

          if [[ "$LOCAL_ONLY" == "true" ]]; then
            echo "=== LOCAL ONLY MODE — no commit/push ==="
            ./scripts/sync-fork.sh --local-only 2>&1
          else
            echo "=== FULL SYNC — merge + commit + push ==="
            ./scripts/sync-fork.sh --strategy theirs 2>&1
          fi

      - name: Sync summary
        if: success()
        run: |
          SHA="$(git rev-parse --short HEAD)"
          VERSION="$(node -p "require('./package.json').version" 2>/dev/null || echo 'unknown')"
          BEHIND=$(git rev-list --count "origin/main..HEAD" 2>/dev/null || echo '?')

          echo "## ✅ Upstream Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | \`${LOCAL_ONLY:-false}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New commits | \`$BEHIND\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repo:** https://github.com/giovannimnz/gsd-2" >> $GITHUB_STEP_SUMMARY

      - name: No changes needed
        if: failure()
        run: |
          echo "## ℹ️ No changes needed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Upstream is already fully integrated. Nothing to sync." >> $GITHUB_STEP_SUMMARY
