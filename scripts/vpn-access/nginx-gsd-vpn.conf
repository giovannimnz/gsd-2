server {
    listen 80;
    server_name gsd.atius-srv-1;

    # Redirect HTTP to HTTPS (if you have SSL) or serve directly
    # For internal VPN use, HTTP is often acceptable
    # Uncomment below if you want强制 HTTPS with self-signed cert
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:1027;
        proxy_http_version 1.1;
        
        # WebSocket support (required for real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable caching for real-time updates
        proxy_cache off;
        proxy_buffering off;
        
        # Timeouts for long-running connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}

